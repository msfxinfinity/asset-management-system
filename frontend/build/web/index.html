<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GoAgile Asset Management System">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ams_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GoAgile AMS</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    /* Instant Dark Background */
    html, body {
      background-color: #0f172a;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #loading-indicator {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 9999;
      background-color: #0f172a;
    }
    .loader {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .indicator-text {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="loader"></div>
    <div class="indicator-text">Initializing GoAgile AMS...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // Robust cleanup hook
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading-indicator');
      if (el) el.remove();
    });
    
    // Fallback if the event doesn't fire (unlikely but safe)
    setTimeout(function() {
      var el = document.getElementById('loading-indicator');
      if (el && window.flutter_web_sdk) { // Only if sdk is present
         el.remove();
      }
    }, 10000);
  </script>
</body>
</html>
